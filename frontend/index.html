<!DOCTYPE html>
<html>
<head>
  <title>CognitiveMirror</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

  <style>
    body {
      background: radial-gradient(circle at top left, #0f172a, #020617 70%);
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .input-dark {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .input-dark:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 10px rgba(99,102,241,0.4);
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #6366f1;
      border-radius: 50%;
      width: 40px;
      height: 40%;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="text-gray-200">

<div id="particles-js" class="fixed inset-0 -z-10"></div>

<div class="max-w-7xl mx-auto p-8 grid grid-cols-1 xl:grid-cols-3 gap-8">

  <!-- LEFT CONTROL PANEL -->
  <div class="glass rounded-3xl p-8 space-y-8 col-span-1">

    <div>
      <h1 class="text-3xl font-bold text-indigo-400">
        CognitiveMirror
      </h1>
      <p class="text-sm text-gray-400 mt-1">
        Multi-Agent Cognitive Intelligence Engine
      </p>
    </div>

    <!-- Problem -->
    <div>
      <label class="block text-gray-400 mb-2 font-medium">
        Problem Statement
      </label>
      <textarea id="problem"
        class="w-full p-3 rounded-lg input-dark text-white"
        rows="3"
        placeholder="Enter the problem...">
      </textarea>
    </div>

    <!-- Steps -->
    <div>
      <label class="block text-gray-400 mb-2 font-medium">
        Steps
      </label>
      <div id="steps-container" class="space-y-3"></div>

      <button onclick="addStep()"
        class="mt-3 w-full py-2 rounded-lg bg-indigo-500 hover:bg-indigo-600 transition text-white">
        + Add Step
      </button>
    </div>

    <!-- Confidence -->
    <div>
      <label class="text-gray-400 font-medium">
        Confidence Level
      </label>
      <input type="range"
        id="confidence"
        min="1"
        max="5"
        value="3"
        class="w-full mt-3 accent-indigo-500">
    </div>

    <!-- Action Buttons -->
    <div class="space-y-3">

      <button onclick="analyze()"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-cyan-500 hover:opacity-90 transition text-white font-semibold">
        Analyze Reasoning
      </button>

      <button onclick="compareAgents()"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 hover:opacity-90 transition text-white font-semibold">
        Compare Agents
      </button>

      <button onclick="exportPDF()"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 hover:opacity-90 transition text-white font-semibold">
        Export PDF Report
      </button>

      <button onclick="startVoiceInput()"
        class="w-full py-3 rounded-xl border border-indigo-400 text-indigo-400 hover:bg-indigo-500 hover:text-white transition">
        🎙 Voice Input
      </button>

    </div>

  </div>


  <!-- RIGHT DASHBOARD -->
  <div class="col-span-2 space-y-8">

    <!-- HEADER -->
    <div class="glass rounded-3xl p-6 flex justify-between items-center">

      <div>
        <h2 class="text-2xl font-bold text-cyan-400">
          Cognitive Intelligence Dashboard
        </h2>
        <p class="text-sm text-gray-400 mt-1">
          Real-time multi-dimensional reasoning analysis
        </p>
      </div>

      <div id="livePreview" class="text-sm text-emerald-400 font-medium">
      </div>

    </div>

    <!-- SCORE + RADAR GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- Results Card -->
      <div class="glass rounded-3xl p-6 space-y-6">
        <h3 class="text-lg font-semibold text-indigo-400">
          Cognitive Scores
        </h3>
        <div id="results" class="space-y-6"></div>
      </div>

      <!-- Radar -->
      <div class="glass rounded-3xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">
          Cognitive Dimensions
        </h3>
        <div class="h-[350px]">
          <canvas id="radarChart"></canvas>
        </div>
      </div>

    </div>

    <!-- GAUGE + AVATAR -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- Stability Gauge -->
      <div class="glass rounded-3xl p-6">
        <h3 class="text-lg font-semibold text-emerald-400 mb-4">
          Cognitive Stability
        </h3>
        <div class="h-[250px]">
          <canvas id="stabilityGauge"></canvas>
        </div>
      </div>

      <!-- AI Voice -->
      <div class="glass rounded-3xl p-6 flex flex-col items-center justify-center space-y-4">

        <div id="aiOrb"
          class="w-24 h-24 rounded-full
                 bg-gradient-to-r from-indigo-500 to-cyan-500
                 shadow-lg shadow-indigo-500/30">
        </div>

        <button onclick="speakAI()"
          class="px-6 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-600 transition text-white">
          🔊 Play AI Analysis
        </button>

      </div>

    </div>

    <!-- Reasoning Flow -->
    <div class="glass rounded-3xl p-6">
      <h3 class="text-lg font-semibold text-rose-400 mb-4">
        Reasoning Flow
      </h3>
      <div id="reasoningGraph" class="space-y-3"></div>
    </div>

    <!-- Multi-Agent -->
    <div class="glass rounded-3xl p-6">
      <h3 class="text-lg font-semibold text-amber-400 mb-4">
        Multi-Agent Architecture
      </h3>
      <div id="agentComparison"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    color: { value: ["#6366f1", "#06b6d4", "#10b981"] },
    opacity: { value: 0.3 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#6366f1",
      opacity: 0.2,
      width: 1
    },
    move: { enable: true, speed: 1.2 }
  }
});
</script>

</body>
</html>
